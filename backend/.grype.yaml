# Grype vulnerability ignore rules for the Cannabis backend container image.
# Each entry documents why the CVE is not actionable for this application.
#
# Review these rules periodically — when upstream patches land, remove the
# corresponding ignore entry and rebuild the image.
#
# Last reviewed: 2026-07-17

ignore:
  # ═══════════════════════════════════════════════════════════════════════════════
  # ALL UNFIXABLE VULNERABILITIES
  # ═══════════════════════════════════════════════════════════════════════════════
  # Suppress all vulnerabilities where Debian has no available patch.
  # These are OS-level packages (perl, curl, glibc, glib, ncurses, etc.)
  # that the application does not directly use or expose to untrusted input.
  #
  # Key packages and why they're not exploitable:
  # - perl/libperl: Never invoked by the application
  # - curl/libcurl: Only used for internal health checks, not untrusted input
  # - glibc: Critical CVE requires scanf %mc from untrusted input (Python doesn't use)
  # - libssh2: No SSH connections made by the application
  # - libxml2: API does not parse untrusted XML
  # - libaom: AV1 video codec, application does not process video
  # - glib: GIO/GDBus not used, no D-Bus interaction
  # - sqlite: Application uses PostgreSQL, not SQLite
  # - wget: Build-time only, not present at runtime
  - fix-state: "wont-fix"
  - fix-state: "not-fixed"

  # ═══════════════════════════════════════════════════════════════════════════════
  # PYTHON 3.14 BINARY — No actionable fix available
  # ═══════════════════════════════════════════════════════════════════════════════
  # Grype detects the Python 3.14.6 binary and flags CVEs that are either:
  # - "Fixed" in unreleased Python 3.15 (not available as stable)
  # - Assessed as not exploitable in this application context
  #
  # CVE-2026-11940: tarfile path traversal — app never extracts untrusted tars
  # CVE-2026-11972: stdlib vulnerability — awaiting 3.14 backport
  # CVE-2026-4360: stdlib vulnerability — awaiting 3.14 backport
  # CVE-2026-0864: stdlib vulnerability — awaiting 3.14 backport
  # CVE-2026-15308: fixed in 3.15.0 — not yet released
  # CVE-2026-12003: fixed in 3.15.0b3 — not yet released
  # CVE-2025-15366: fixed in 3.15.0a6 — not yet released
  # CVE-2025-15367: fixed in 3.15.0a6 — not yet released
  - vulnerability: "CVE-2026-11940"
  - vulnerability: "CVE-2026-11972"
  - vulnerability: "CVE-2026-4360"
  - vulnerability: "CVE-2026-0864"
  - vulnerability: "CVE-2026-15308"
  - vulnerability: "CVE-2026-12003"
  - vulnerability: "CVE-2025-15366"
  - vulnerability: "CVE-2025-15367"

  # ═══════════════════════════════════════════════════════════════════════════════
  # PYTHON 3.13 SYSTEM LIBRARY (trixie ships both 3.13 and 3.14)
  # ═══════════════════════════════════════════════════════════════════════════════
  # Debian trixie includes python3.13 as a system dependency for apt/etc.
  # Our application runs on Python 3.14. Vulnerabilities in python3.13 packages
  # are not reachable by our application code.
  - package:
      name: "libpython3.13-minimal"
  - package:
      name: "libpython3.13-stdlib"
  - package:
      name: "python3.13"
  - package:
      name: "python3.13-minimal"
