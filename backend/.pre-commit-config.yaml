# Pre-commit hooks for Cannabis Backend
# See https://pre-commit.com for more information

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # Python code formatting with Black
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3.13
        args: [--line-length=88]

  # Import sorting with isort
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black, --line-length=88]

  # Remove unused imports and variables with autoflake
  - repo: https://github.com/PyCQA/autoflake
    rev: v2.3.1
    hooks:
      - id: autoflake
        args:
          - --in-place
          - --remove-all-unused-imports
          - --remove-unused-variables
          - --remove-duplicate-keys
          - --ignore-init-module-imports

  # Linting with flake8 (warnings only, non-blocking)
  - repo: local
    hooks:
      - id: flake8
        name: flake8 (warnings only)
        entry: ./.pre-commit-flake8-wrapper.sh
        language: script
        types: [python]
        pass_filenames: true
        verbose: true
        args:
          - --max-line-length=88
          - --extend-ignore=E203,W503,E501
          - --exclude=migrations,__pycache__,.venv,venv,build,dist

  # Django-specific checks
  - repo: https://github.com/adamchainz/django-upgrade
    rev: 1.22.2
    hooks:
      - id: django-upgrade
        args: [--target-version=5.1]

  # Security checks with bandit (warnings only, non-blocking)
  - repo: local
    hooks:
      - id: bandit
        name: bandit (warnings only)
        entry: ./.pre-commit-bandit-wrapper.sh
        language: script
        types: [python]
        pass_filenames: false
        verbose: true
        args: [-c, pyproject.toml, -r, ., --exclude, tests]

  # Final summary (runs after all other checks)
  - repo: local
    hooks:
      - id: commit-summary
        name: Commit Summary
        entry: ./.pre-commit-confirm-wrapper.sh
        language: script
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
        verbose: true

# Global settings
default_language_version:
  python: python3.13

# Files to exclude globally
exclude: |
  (?x)^(
      migrations/.*|
      __pycache__/.*|
      \.venv/.*|
      venv/.*|
      build/.*|
      dist/.*|
      \.pytest_cache/.*|
      htmlcov/.*|
      staticfiles/.*|
      etl/.*
  )$

# Do not stop on first failure
fail_fast: false

# Minimum pre-commit version
minimum_pre_commit_version: '3.0.0'
