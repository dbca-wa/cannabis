apiVersion: v1
kind: PersistentVolume
metadata:
  annotations:
    pv.kubernetes.io/provisioned-by: blob.csi.azure.com
  name: pv-cannabis-media-data-blob
spec:
  capacity:
    storage: 16Gi
  accessModes:
    - ReadWriteMany
  storageClassName: azureblob-fuse-retain
  mountOptions:
    - -o allow_other
    - --file-cache-timeout-in-seconds=120
  csi:
    driver: blob.csi.azure.com
    volumeHandle: dbcacannabisdb_cannabis-website-prod
    volumeAttributes:
      storageAccount: dbcacannabisdb
      containerName: cannabis-website-prod
    nodeStageSecretRef:
      name: cannabis-azure-storage-secret-prod
      namespace: cannabis
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-cannabis-media-data-blob
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 16Gi
  volumeName: pv-cannabis-media-data-blob-prod
  storageClassName: azureblob-fuse-retain
