apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cannabis
nameSuffix: -prod
secretGenerator:
    - name: cannabis-env
      type: Opaque
      envs:
          - .env
configMapGenerator:
    - name: prince2-license
      files:
          - license.dat
generatorOptions:
    disableNameSuffixHash: true
resources:
    - ../../base
    - ingress.yaml
    - pdb.yaml
labels:
    - includeSelectors: true
      pairs:
          variant: prod
patches:
    - path: deployment_patch.yaml
    - path: deployment_hpa_patch.yaml
    - path: service_patch.yaml
images:
    - name: ghcr.io/dbca-wa/cannabis-backend
      newTag: 1.0.8
    - name: ghcr.io/dbca-wa/cannabis-frontend
      newTag: 1.0.8
