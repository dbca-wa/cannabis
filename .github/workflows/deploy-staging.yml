name: Deploy Staging

on:
  push:
    branches: [staging]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: dbca-wa/cannabis

permissions:
  contents: read
  packages: write
  pull-requests: read

jobs:
  # ====================== DETECT CHANGES ======================
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    if: |
      !contains(github.event.head_commit.message, '[skip ci]') &&
      github.actor != 'github-actions[bot]'
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - '.github/workflows/deploy-staging.yml'
              - '.github/workflows/test.yml'
            backend:
              - 'backend/**'
              - '.github/workflows/deploy-staging.yml'
              - '.github/workflows/test.yml'

  # ====================== BUILD FRONTEND ======================
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: |
      !contains(github.event.head_commit.message, '[skip ci]') &&
      success() &&
      needs.detect-changes.outputs.frontend == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from git
        id: sha
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          # Use git describe to get nearest tag + distance (e.g. v4.0.0-3-gabc1234)
          # Falls back to short SHA if no tags exist
          VERSION=$(git describe --tags --always 2>/dev/null || echo "${SHORT_SHA}")
          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Build version: ${VERSION}"

      - name: Build and push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:test
          build-args: |
            VITE_VERSION=${{ steps.sha.outputs.VERSION }}
            VITE_SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          cache-from: type=gha,scope=frontend-staging
          cache-to: type=gha,mode=min,scope=frontend-staging
          labels: |
            org.opencontainers.image.title=Cannabis Frontend
            org.opencontainers.image.version=${{ steps.sha.outputs.VERSION }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  # ====================== BUILD BACKEND ======================
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: |
      !contains(github.event.head_commit.message, '[skip ci]') &&
      success() &&
      needs.detect-changes.outputs.backend == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract commit SHA
        id: sha
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push Backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:test
          cache-from: type=gha,scope=backend-staging
          cache-to: type=gha,mode=max,scope=backend-staging
          labels: |
            org.opencontainers.image.title=Cannabis Backend
            org.opencontainers.image.version=test-${{ steps.sha.outputs.SHORT_SHA }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
