<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/cannabis.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- Content Security Policy -->
		<meta
			http-equiv="Content-Security-Policy"
			content="
				default-src 'self';
				script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:;
				script-src-elem 'self' 'unsafe-inline' blob:;
				worker-src 'self' blob:;
				style-src 'self' 'unsafe-inline';
				img-src 'self' data: blob: http: https:;
				font-src 'self' data:;
				connect-src 'self' http://127.0.0.1:8000 https://*.ingest.us.sentry.io;
				frame-src 'self' blob: http://127.0.0.1:8000;
				object-src 'none';
				base-uri 'self';
				form-action 'self';
			"
		/>

		<title>Cannabis</title>
		<!-- Apply theme before React renders to prevent flash of wrong theme -->
		<script>
			(function () {
				try {
					var resolved = localStorage.getItem("cannabis-theme-resolved");
					if (resolved === "dark" || resolved === "light") {
						document.documentElement.classList.add(resolved);
					} else if (
						window.matchMedia("(prefers-color-scheme: dark)").matches
					) {
						document.documentElement.classList.add("dark");
					}
				} catch (e) {}
			})();
		</script>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
